#!/bin/sh

PROGRAM="/usr/bin/edge-gateway"
CONFIG="/etc/edge-gateway/gateway.conf"
PIDFILE="/var/run/edge-gateway.pid"
LOGFILE="/var/log/edge-gateway.log"

start_service()
{
    echo "Starting edge gateway..."

    if [ ! -x "$PROGRAM" ]; then
        echo "Error: $PROGRAM does not exist or is not executable"
        return 1
    fi

    if [ -f "$PIDFILE" ]; then
        PID="$(cat "$PIDFILE")"

        if kill -0 "$PID" 2>/dev/null; then
            echo "Edge gateway is already running with PID $PID"
            return 0
        fi

        rm -f "$PIDFILE"
    fi

    mkdir -p /var/run
    mkdir -p /var/log

    if [ -f "$CONFIG" ]; then
        "$PROGRAM" "$CONFIG" >> "$LOGFILE" 2>&1 &
    else
        echo "Warning: $CONFIG not found; starting without configuration"
        "$PROGRAM" >> "$LOGFILE" 2>&1 &
    fi

    echo $! > "$PIDFILE"
    echo "Edge gateway started with PID $(cat "$PIDFILE")"
}

stop_service()
{
    echo "Stopping edge gateway..."

    if [ ! -f "$PIDFILE" ]; then
        echo "Edge gateway is not running"
        return 0
    fi

    PID="$(cat "$PIDFILE")"

    if kill -0 "$PID" 2>/dev/null; then
        kill "$PID"
    fi

    rm -f "$PIDFILE"
    echo "Edge gateway stopped"
}

status_service()
{
    if [ -f "$PIDFILE" ]; then
        PID="$(cat "$PIDFILE")"

        if kill -0 "$PID" 2>/dev/null; then
            echo "Edge gateway is running with PID $PID"
            return 0
        fi
    fi

    echo "Edge gateway is not running"
    return 1
}

case "$1" in
    start)
        start_service
        ;;
    stop)
        stop_service
        ;;
    restart)
        stop_service
        sleep 1
        start_service
        ;;
    status)
        status_service
        ;;
    *)
        echo "Usage: $0 {start|stop|restart|status}"
        exit 1
        ;;
esac
